name: Docker
run-name: Docker build for ${{ github.ref_name || gitea.ref_name }}

on:
  push:
    tags: [v*]

jobs:
  quality-gates:
    runs-on: ${{ vars.RUNNER_TYPE || 'ubuntu-latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docker:
    needs: [quality-gates]
    runs-on: ${{ vars.RUNNER_TYPE || 'ubuntu-latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate registry credentials
        run: |
          if [ -z "${{ secrets.REGISTRY_USER }}" ] || [ -z "${{ secrets.REGISTRY_PASSWORD }}" ]; then
            echo "::error::Registry credentials missing. Set REGISTRY_USER and REGISTRY_PASSWORD secrets."
            exit 1
          fi

      - name: Extract version from tag
        id: version
        run: |
          # Strip 'v' prefix: v0.9.0 -> 0.9.0
          VERSION="${{ github.ref_name || gitea.ref_name }}"
          VERSION="${VERSION#v}"
          MAJOR_MINOR="${VERSION%.*}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major_minor=$MAJOR_MINOR" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (major.minor: $MAJOR_MINOR)"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/todd/narratorr:latest
            ghcr.io/todd/narratorr:${{ steps.version.outputs.version }}
            ghcr.io/todd/narratorr:${{ steps.version.outputs.major_minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify multi-arch manifest
        run: |
          MANIFEST=$(docker buildx imagetools inspect ghcr.io/todd/narratorr:${{ steps.version.outputs.version }} 2>&1)
          echo "$MANIFEST"

          if ! echo "$MANIFEST" | grep -q 'linux/amd64'; then
            echo "::error::Multi-arch manifest missing linux/amd64"
            exit 1
          fi
          if ! echo "$MANIFEST" | grep -q 'linux/arm64'; then
            echo "::error::Multi-arch manifest missing linux/arm64"
            exit 1
          fi
          echo "Multi-arch manifest verified: linux/amd64 and linux/arm64 present"

      - name: Report image size
        run: |
          docker images ghcr.io/todd/narratorr --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}" || true
          echo "Image size is informational only — no hard gate."

      - name: Smoke test container
        run: |
          docker run -d --name smoke-test \
            -e DATABASE_URL=file:/config/narratorr.db \
            -p 3199:3000 \
            ghcr.io/todd/narratorr:${{ steps.version.outputs.version }}

          # Wait for /api/health to return 200 (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3199/api/health > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          HTTP_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3199/api/health)

          # Verify runtime Node version is 22.x
          NODE_VERSION=$(docker exec smoke-test node --version)
          echo "Container Node version: $NODE_VERSION"

          docker stop smoke-test > /dev/null 2>&1 || true
          docker rm smoke-test > /dev/null 2>&1 || true

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Smoke test failed — /api/health returned $HTTP_STATUS"
            exit 1
          fi

          if ! echo "$NODE_VERSION" | grep -q '^v22\.'; then
            echo "::error::Node version mismatch — expected v22.*, got $NODE_VERSION"
            exit 1
          fi

          echo "Smoke test passed (HTTP $HTTP_STATUS, Node $NODE_VERSION)"
