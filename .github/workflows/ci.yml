name: CI
run-name: CI for ${{ github.ref_name }}

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel an in-progress run when a newer commit lands on the same ref, so a
# stuck/superseded run frees the runner instead of grinding to its timeout.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # fail fast on a hung step instead of running to GitHub's 6h default

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Health smoke test
        run: |
          NODE_ENV=production DATABASE_URL=file:/tmp/ci-smoke-test.db PORT=3199 node dist/server/index.js &
          SERVER_PID=$!

          # Wait for server to be ready (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3199/api/health > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Assert health endpoint returns 200
          HTTP_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3199/api/health)
          kill $SERVER_PID 2>/dev/null || true

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Health check passed (HTTP $HTTP_STATUS)"

  e2e:
    runs-on: ubuntu-latest
    needs: quality-gates
    timeout-minutes: 25   # fail fast on a hung step instead of running to GitHub's 6h default

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      # The Playwright browser cache is keyed on the lockfile hash and evicts
      # after 7 days of no access; since e2e only runs on main PRs/pushes, a cold
      # 170MB CDN download happens on most release runs — and that download can
      # hang. Cap each attempt and retry so a flaky download fails fast and
      # recovers instead of stalling the job.
      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          for attempt in 1 2 3; do
            echo "::group::Playwright browser install (attempt $attempt)"
            if timeout 300 pnpm exec playwright install chromium; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed or timed out after 5m; retrying in 10s..."
            sleep 10
          done
          echo "Playwright browser install failed after 3 attempts"
          exit 1

      - name: Drop broken Microsoft apt sources
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list

      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps chromium

      - name: Build
        run: pnpm build

      - name: Run E2E smoke suite
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 7
