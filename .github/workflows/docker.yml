name: Build & Push Docker Image
run-name: Docker build for ${{ github.ref_name }}

# Two channels, build/publish only — no deploy:
#   - push to `develop`         → :develop on DockerHub + GHCR (bleeding edge; pull manually)
#   - semver tag `vX.Y.Z` on main → :latest + :X.Y.Z + :X.Y on DockerHub + GHCR, plus a GitHub Release
# Non-semver tags (e.g. v1219_01) do not match the filter and trigger nothing.
on:
  push:
    branches: [develop]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch: {}

env:
  IMAGE_NAME: narratorr/narratorr

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docker:
    needs: [quality-gates]
    runs-on: ubuntu-latest
    timeout-minutes: 30   # buildx/cache/QEMU can wedge with no cap (run 28070407209 hung ~90m); fail fast instead

    permissions:
      contents: write   # create GitHub Release on the semver-tag (release) path
      packages: write   # push images to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Registry credentials missing. Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets."
            exit 1
          fi

      - name: Compute build vars
        id: vars
        run: |
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "git_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "git_tag=develop-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata (tag matrix)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository }}
          # Release (semver tag): :X.Y.Z + :X.Y, and :latest auto-added by flavor latest=auto.
          # Dev (any non-tag ref, incl. develop push / manual dispatch): :develop only.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=develop,enable=${{ github.ref_type != 'tag' }}

      - name: Set up QEMU (for ARM64)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_TAG=${{ steps.vars.outputs.git_tag }}
            BUILD_TIME=${{ steps.vars.outputs.build_time }}

      - name: Report image size
        run: |
          docker images ${{ env.IMAGE_NAME }} --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}" || true
          echo "Image size is informational only — no hard gate."

      - name: Verify multi-arch manifest
        run: |
          MANIFEST=$(docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} 2>&1)
          echo "$MANIFEST"

          if ! echo "$MANIFEST" | grep -q 'linux/amd64'; then
            echo "::error::Multi-arch manifest missing linux/amd64"
            exit 1
          fi
          if ! echo "$MANIFEST" | grep -q 'linux/arm64'; then
            echo "::error::Multi-arch manifest missing linux/arm64"
            exit 1
          fi
          echo "Multi-arch manifest verified: linux/amd64 and linux/arm64 present"

      - name: Smoke test container
        run: |
          docker run -d --name smoke-test \
            -e DATABASE_URL=file:/config/narratorr.db \
            -p 3199:3000 \
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

          # Wait for /api/health to return 200 (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3199/api/health > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          HTTP_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3199/api/health)

          # Verify runtime Node version is 24.x
          NODE_VERSION=$(docker exec smoke-test node --version)
          echo "Container Node version: $NODE_VERSION"

          # Guard the ffmpeg-8 dependency (#1679): xHE-AAC / USAC decode needs ffmpeg >= 8.
          # Parse the major NUMERICALLY (sed-captured integer, then `-lt` compare) so a bare
          # substring '8' inside an unrelated build token can't satisfy the gate.
          FFMPEG_LINE=$(docker exec smoke-test ffmpeg -version | head -n1)
          echo "Container ffmpeg: $FFMPEG_LINE"
          FFMPEG_MAJOR=$(printf '%s\n' "$FFMPEG_LINE" | sed -n 's/^ffmpeg version \([0-9][0-9]*\)\..*/\1/p')

          # Verify ffprobe exists and is executable at its resolved path inside the image.
          FFPROBE_PATH=$(docker exec smoke-test sh -c 'command -v ffprobe' || true)
          echo "Container ffprobe path: $FFPROBE_PATH"
          if [ -n "$FFPROBE_PATH" ] && docker exec smoke-test test -x "$FFPROBE_PATH"; then
            FFPROBE_EXECUTABLE=yes
          else
            FFPROBE_EXECUTABLE=no
          fi

          docker stop smoke-test > /dev/null 2>&1 || true
          docker rm smoke-test > /dev/null 2>&1 || true

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Smoke test failed — /api/health returned $HTTP_STATUS"
            exit 1
          fi

          if ! echo "$NODE_VERSION" | grep -q '^v24\.'; then
            echo "::error::Node version mismatch — expected v24.*, got $NODE_VERSION"
            exit 1
          fi

          if [ -z "$FFMPEG_MAJOR" ]; then
            echo "::error::Could not parse ffmpeg major version from: $FFMPEG_LINE"
            exit 1
          fi
          if [ "$FFMPEG_MAJOR" -lt 8 ]; then
            echo "::error::ffmpeg major version $FFMPEG_MAJOR < 8 — xHE-AAC/USAC decode regression (#1679)"
            exit 1
          fi

          if [ "$FFPROBE_EXECUTABLE" != "yes" ]; then
            echo "::error::ffprobe missing or not executable in image (path: '${FFPROBE_PATH:-not found}')"
            exit 1
          fi

          echo "Smoke test passed (HTTP $HTTP_STATUS, Node $NODE_VERSION, ffmpeg major $FFMPEG_MAJOR, ffprobe $FFPROBE_PATH)"

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
