name: Build & Push Docker Image
run-name: Docker build for ${{ github.ref_name }}

on:
  push:
    tags: [v*]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override (default: from git tag)'
        required: false

env:
  IMAGE_NAME: narratorr/narratorr

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docker:
    needs: [quality-gates]
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate registry credentials
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Registry credentials missing. Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets."
            exit 1
          fi

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            VERSION="${{ inputs.tag }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          MAJOR_MINOR="${VERSION%.*}"
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major_minor=$MAJOR_MINOR" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (major.minor: $MAJOR_MINOR) at $BUILD_TIME"

      - name: Set up QEMU (for ARM64)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major_minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_TAG=v${{ steps.version.outputs.version }}
            BUILD_TIME=${{ steps.version.outputs.build_time }}

      - name: Report image size
        run: |
          docker images ${{ env.IMAGE_NAME }} --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}" || true
          echo "Image size is informational only — no hard gate."

      - name: Verify multi-arch manifest
        run: |
          MANIFEST=$(docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} 2>&1)
          echo "$MANIFEST"

          if ! echo "$MANIFEST" | grep -q 'linux/amd64'; then
            echo "::error::Multi-arch manifest missing linux/amd64"
            exit 1
          fi
          if ! echo "$MANIFEST" | grep -q 'linux/arm64'; then
            echo "::error::Multi-arch manifest missing linux/arm64"
            exit 1
          fi
          echo "Multi-arch manifest verified: linux/amd64 and linux/arm64 present"

      - name: Smoke test container
        run: |
          docker run -d --name smoke-test \
            -e DATABASE_URL=file:/config/narratorr.db \
            -p 3199:3000 \
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

          # Wait for /api/health to return 200 (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3199/api/health > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          HTTP_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3199/api/health)

          # Verify runtime Node version is 24.x
          NODE_VERSION=$(docker exec smoke-test node --version)
          echo "Container Node version: $NODE_VERSION"

          # Verify commit SHA was injected (proves full GIT_COMMIT → Dockerfile → tsup → getCommit() path)
          COMMIT=$(curl -sf http://localhost:3199/api/health | jq -r '.commit // "unknown"')
          echo "Container commit: $COMMIT"

          docker stop smoke-test > /dev/null 2>&1 || true
          docker rm smoke-test > /dev/null 2>&1 || true

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Smoke test failed — /api/health returned $HTTP_STATUS"
            exit 1
          fi

          if ! echo "$NODE_VERSION" | grep -q '^v24\.'; then
            echo "::error::Node version mismatch — expected v24.*, got $NODE_VERSION"
            exit 1
          fi

          if [ "$COMMIT" = "unknown" ] || [ "${#COMMIT}" != "7" ]; then
            echo "::error::Commit SHA not injected or not 7 chars — got: $COMMIT"
            exit 1
          fi

          echo "Smoke test passed (HTTP $HTTP_STATUS, Node $NODE_VERSION, commit $COMMIT)"

      - name: Deploy to production
        run: |
          HTTP_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}")
          if [ "$HTTP_STATUS" != "204" ] && [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Portainer webhook returned $HTTP_STATUS — deploy may not have triggered"
          else
            echo "Deploy triggered via Portainer webhook (HTTP $HTTP_STATUS)"
          fi
