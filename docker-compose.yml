version: '3.8'

services:
  narratorr:
    image: ghcr.io/todd/narratorr:latest
    # To build from local source instead of pulling from the registry:
    # build: .
    container_name: narratorr
    ports:
      - "3000:3000"
    volumes:
      - ./config:/config           # Database and config
      - /path/to/audiobooks:/audiobooks  # Library path (change this)
      - /path/to/downloads:/downloads    # Download client save path (change this)
    environment:
      - TZ=America/New_York
      - NODE_ENV=production
      - CONFIG_PATH=/config
      - LIBRARY_PATH=/audiobooks
      - DATABASE_URL=file:/config/narratorr.db
      - PUID=1000                # Set container process UID (default: 911)
      - PGID=1000                # Set container process GID (default: 911)
      # - URL_BASE=/narratorr    # Subpath for reverse proxy (optional, default: /)
    restart: unless-stopped
